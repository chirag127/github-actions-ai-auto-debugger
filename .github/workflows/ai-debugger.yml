name: AI Auto-Debugger (Centralized)

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: 'Owner of the failed repo'
        required: true
      repo_name:
        description: 'Name of the failed repo'
        required: true
      run_id:
        description: 'ID of the failed workflow run'
        required: true
      installation_id:
        description: 'Installation ID of the GitHub App'
        required: true
      head_sha:
        description: 'Head SHA of the failed workflow run'
        required: true
      branch:
        description: 'Branch of the failed workflow run'
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      # 1. Generate App Token for the target repo
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.event.inputs.repo_owner }}
          repositories: ${{ github.event.inputs.repo_name }}

      # 2. Checkout the TARGET (failed) repository
      - name: Checkout Target Repository
        uses: actions/checkout@v6
        with:
          repository: >-
            ${{ github.event.inputs.repo_owner }}/${{
            github.event.inputs.repo_name }}
          ref: ${{ github.event.inputs.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # 3. Setup Node.js for Gemini CLI
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # 4. PRIMARY: Run Gemini CLI as the agentic debugger
      - name: "Primary: Gemini CLI Debugger"
        id: gemini-cli
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an AI debugging agent. A GitHub Actions workflow
            failed on the repository:
              ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }}

            Failed Run ID: ${{ github.event.inputs.run_id }}
            Branch: ${{ github.event.inputs.branch }}
            Commit: ${{ github.event.inputs.head_sha }}

            Your task:
            1. Run `gh run view ${{ github.event.inputs.run_id }} --repo ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }} --log-failed` to fetch the failure logs.
            2. Carefully analyze the root cause of the failure.
            3. Read the relevant source files and fix the bug.
            4. If possible, run the test suite locally to verify
               your fix.
            5. If the fix is verified, commit your changes to a new
               branch named
               `ai-fix/${{ github.event.inputs.run_id }}` and create
               a pull request targeting the
               `${{ github.event.inputs.branch }}` branch.
            6. If you cannot fix it, leave a detailed comment
               explaining the root cause and suggested manual steps.

            Important:
            - Keep changes minimal and surgical.
            - Do NOT refactor unrelated code.
            - The PR title should start with "fix: " and describe
              the issue.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        continue-on-error: true

      # 5. FALLBACK: Multi-provider AI Agent
      #    Only runs if Gemini CLI failed.
      - name: "Fallback: Checkout AI Debugger Repo"
        if: steps.gemini-cli.outcome == 'failure'
        uses: actions/checkout@v6
        with:
          repository: >-
            chirag127/github-actions-ai-auto-debugger
          path: .ai-debugger
          fetch-depth: 0

      - name: "Fallback: Run Multi-Provider Agent"
        if: steps.gemini-cli.outcome == 'failure'
        run: node .ai-debugger/dist/index.js
        env:
          # AI Provider Configuration
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          # GitHub App Auth
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # Target Repo Info (from workflow_dispatch inputs)
          TARGET_REPO_OWNER: ${{ github.event.inputs.repo_owner }}
          TARGET_REPO_NAME: ${{ github.event.inputs.repo_name }}
          TARGET_RUN_ID: ${{ github.event.inputs.run_id }}
          TARGET_INSTALLATION_ID: >-
            ${{ github.event.inputs.installation_id }}
          TARGET_HEAD_SHA: ${{ github.event.inputs.head_sha }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          # Langfuse (optional)
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        continue-on-error: true
