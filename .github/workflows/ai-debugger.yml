name: AI Auto-Debugger (Centralized)

on:
  workflow_dispatch:
    inputs:
      repo_owner:
        description: 'Owner of the failed repo'
        required: true
      repo_name:
        description: 'Name of the failed repo'
        required: true
      run_id:
        description: 'ID of the failed workflow run'
        required: true
      installation_id:
        description: 'Installation ID of the GitHub App'
        required: true
      head_sha:
        description: 'Head SHA of the failed workflow run'
        required: true
      branch:
        description: 'Branch of the failed workflow run'
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the TARGET (failed) repository
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.event.inputs.repo_owner }}
          repositories: ${{ github.event.inputs.repo_name }}

      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }}
          ref: ${{ github.event.inputs.head_sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # 2. Setup tooling so Gemini CLI can use gh CLI
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Run Gemini CLI as the agentic debugger
      - name: Run Gemini CLI Debugger
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an AI debugging agent. A GitHub Actions workflow
            failed on the repository:
              ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }}

            Failed Run ID: ${{ github.event.inputs.run_id }}
            Branch: ${{ github.event.inputs.branch }}
            Commit: ${{ github.event.inputs.head_sha }}

            Your task:
            1. Run `gh run view ${{ github.event.inputs.run_id }} --repo ${{ github.event.inputs.repo_owner }}/${{ github.event.inputs.repo_name }} --log-failed` to fetch the failure logs.
            2. Carefully analyze the root cause of the failure.
            3. Read the relevant source files and fix the bug.
            4. If possible, run the test suite locally to verify your fix.
            5. If the fix is verified, commit your changes to a new branch
               named `ai-fix/${{ github.event.inputs.run_id }}` and create
               a pull request targeting the `${{ github.event.inputs.branch }}` branch.
            6. If you cannot fix it, leave a detailed comment explaining the
               root cause and suggested manual steps.

            Important:
            - Keep changes minimal and surgical.
            - Do NOT refactor unrelated code.
            - The PR title should start with "fix: " and describe the issue.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        continue-on-error: true
